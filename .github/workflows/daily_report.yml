name: Daily Stock Analysis Report

on:
  schedule:
    # 🕒 한국 시간 아침 6시 43분 = UTC 전날 밤 21시 43분
    # 미국 월요일 장 마감 -> 한국 화요일 아침 리포트이므로
    # UTC 기준으로는 '월~금(1-5)'로 설정해야 함
    - cron: '43 21 * * 1-5'

  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  stock-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 🚨 fakeredis 버전만 고정하여 prefect 실행 에러 방지 (나머지는 항상 최신 버전 유지)
        pip install "fakeredis<2.26.0" pandas yfinance google-genai google-api-core sqlalchemy prefect python-dotenv tabulate markdown jinja2 psycopg2-binary tenacity yahooquery

    - name: Run Main Script
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        # PYTHONPATH 설정이 필요할 수 있어 모듈 실행 방식 유지
        python -m app.main
